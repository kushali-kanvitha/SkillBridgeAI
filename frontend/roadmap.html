<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generate Roadmap | SkillBridge AI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="roadmap.css">

</head>

<body>

<div class="container">

    <div class="form-header">

        <h1>🚀 Build Your Future with AI</h1>

        <p>
            Fill in your details below and let SkillBridge AI create a personalized career roadmap just for you.
        </p>

    </div>

    <!-- Progress Bar (Static for now) -->
    <div class="progress-section">

        <div class="progress-text">

    <span>Profile Completion</span>

    <span id="progressPercent">0%</span>

</div>

<div class="progress-bar">

    <div class="progress-fill" id="progressFill"></div>

</div>

    </div>

    <form id="careerForm">

        <label>👤 Full Name</label>

        <input
            type="text"
            id="name"
            placeholder="Enter your full name"
            required
        >

        <label>🎓 Education</label>

        <select id="education" required>

            <option>B.Tech</option>
            <option>BCA</option>
            <option>MCA</option>
            <option>Intermediate</option>
            <option>Other</option>

        </select>

        <label>💻 Current Skills</label>

        <input
            type="text"
            id="skills"
            placeholder="Example: HTML, CSS, Java"
        >

        <label>🎯 Career Goal</label>

        <input
            list="careerGoals"
            id="goal"
            placeholder="Choose or type your dream career"
            required
        >

        <datalist id="careerGoals">

            <option value="Full Stack Java Developer">
            <option value="Frontend Developer">
            <option value="Backend Developer">
            <option value="AI Engineer">
            <option value="Data Analyst">
            <option value="Data Scientist">
            <option value="Cloud Engineer">
            <option value="Cyber Security">
            <option value="Android Developer">
            <option value="Government Jobs">
            <option value="SSC">
            <option value="UPSC">

        </datalist>

        <label>⏰ Study Hours Per Day</label>

        <input
            type="number"
            id="hours"
            min="1"
            max="12"
            placeholder="Example: 3"
        >

        <label>📅 Target Duration</label>

        <select id="duration">

            <option>3 Months</option>
            <option>6 Months</option>
            <option>1 Year</option>

        </select>

        <button type="submit">

            🚀 Generate My AI Roadmap

        </button>

    </form>

</div>
<!-- AI Loading Screen -->

<div class="loader-overlay" id="loader">

    <div class="loader-box">

        <h2>🤖 SkillBridge AI</h2>

        <p id="loadingText">

            Analyzing your profile...

        </p>

        <div class="loading-bar">

            <div class="loading-fill" id="loadingFill"></div>

        </div>

    </div>

</div>
<script src="roadmap.js"></script>

</body>
</html>
